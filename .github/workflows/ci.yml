name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check code style (black)
        run: black --check todo/ tests/ main.py

      - name: Check code quality (flake8)
        run: flake8 todo/ tests/ main.py

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=todo --cov-report=term-missing --cov-fail-under=70